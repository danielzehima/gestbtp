{% extends 'base.html' %}
{% block auth %}
<div class="auth-wrap"><div class="auth-card">
  <div style="text-align:center;margin-bottom:20px"><img src="{{ url_for('static', filename='img/logo.png') }}" alt="GESTBTP" style="height:140px"></div>
  <h2>Nouveau mot de passe</h2>
  <form method="post">
    {{ form.hidden_tag() }}
    <div class="form-group">{{ form.password.label }} {{ form.password() }}</div>
    <div class="form-group">{{ form.confirm.label }} {{ form.confirm() }}</div>
    {{ form.submit(class="btn btn-primary", style="width:100%;justify-content:center") }}
  </form>
</div></div>
{% endblock %}
